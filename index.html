<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rain</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #060a10;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    cursor: none;
  }

  canvas {
    position: fixed;
    inset: 0;
    display: block;
  }

  /* custom cursor dot */
  #cursor {
    position: fixed;
    width: 8px;
    height: 8px;
    background: rgba(180, 220, 255, 0.9);
    border-radius: 50%;
    pointer-events: none;
    z-index: 999;
    transform: translate(-50%, -50%);
    transition: width 0.15s, height 0.15s, background 0.15s;
    box-shadow: 0 0 12px rgba(140, 200, 255, 0.8), 0 0 30px rgba(100, 170, 255, 0.3);
  }

  #cursor-ring {
    position: fixed;
    width: 36px;
    height: 36px;
    border: 1px solid rgba(140, 200, 255, 0.3);
    border-radius: 50%;
    pointer-events: none;
    z-index: 998;
    transform: translate(-50%, -50%);
    transition: width 0.3s ease, height 0.3s ease, opacity 0.3s ease;
  }

  /* ui buttons bottom right */
  #ui {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    align-items: flex-end;
  }

  .rain-btn {
    font-family: 'Courier New', monospace;
    font-size: 0.72rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(160, 210, 255, 0.55);
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(160, 210, 255, 0.1);
    border-radius: 6px;
    padding: 0.5rem 1rem;
    cursor: none;
    transition: all 0.25s ease;
  }
  .rain-btn:hover {
    color: rgba(200, 235, 255, 0.95);
    border-color: rgba(160, 210, 255, 0.35);
    background: rgba(160, 210, 255, 0.07);
    box-shadow: 0 0 20px rgba(100, 170, 255, 0.1);
  }
  .rain-btn.active {
    color: rgba(200, 235, 255, 1);
    border-color: rgba(160, 210, 255, 0.6);
    background: rgba(160, 210, 255, 0.12);
  }

  #label {
    position: fixed;
    top: 2rem;
    left: 2.5rem;
    font-family: 'Courier New', monospace;
    font-size: 0.68rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(140, 190, 255, 0.18);
    z-index: 100;
    user-select: none;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="cursor"></div>
<div id="cursor-ring"></div>

<div id="label">Rain</div>

<div id="ui">
  <button class="rain-btn active" id="btn-heavy">Heavy</button>
  <button class="rain-btn" id="btn-medium">Medium</button>
  <button class="rain-btn" id="btn-drizzle">Drizzle</button>
  <button class="rain-btn" id="btn-thunder">Thunder</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ── mouse state ─────────────────────────────────
const mouse = { x: -999, y: -999, vx: 0, vy: 0, px: 0, py: 0 };

const cursorDot  = document.getElementById('cursor');
const cursorRing = document.getElementById('cursor-ring');

let ringX = 0, ringY = 0;

window.addEventListener('mousemove', e => {
  mouse.vx = e.clientX - mouse.px;
  mouse.vy = e.clientY - mouse.py;
  mouse.px = mouse.x;
  mouse.py = mouse.y;
  mouse.x  = e.clientX;
  mouse.y  = e.clientY;

  cursorDot.style.left = e.clientX + 'px';
  cursorDot.style.top  = e.clientY + 'px';
});

// lazy-follow ring
function animateRing() {
  ringX += (mouse.x - ringX) * 0.12;
  ringY += (mouse.y - ringY) * 0.12;
  cursorRing.style.left = ringX + 'px';
  cursorRing.style.top  = ringY + 'px';
  requestAnimationFrame(animateRing);
}
animateRing();

// ── scene config ─────────────────────────────────
let config = {
  dropCount:   700,
  speed:       [18, 32],
  length:      [40, 90],
  wind:        0.18,      // slant factor
  splash:      true,
  fog:         true,
  thunder:     false,
  bgColor:     '#060a10',
};

const PRESETS = {
  heavy:   { dropCount: 700, speed: [18,32], length: [40,90],  wind: 0.18, splash: true,  fog: true,  thunder: false },
  medium:  { dropCount: 320, speed: [12,22], length: [28,60],  wind: 0.14, splash: true,  fog: true,  thunder: false },
  drizzle: { dropCount: 110, speed: [5, 12], length: [10,28],  wind: 0.06, splash: false, fog: false, thunder: false },
  thunder: { dropCount: 850, speed: [24,40], length: [60,120], wind: 0.22, splash: true,  fog: true,  thunder: true  },
};

// ── resize ────────────────────────────────────────
function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', () => { resize(); initDrops(); });
resize();

// ── drops ─────────────────────────────────────────
let drops = [];

function makeDropRandom() {
  const speed = config.speed[0] + Math.random() * (config.speed[1] - config.speed[0]);
  return {
    x:      Math.random() * canvas.width,
    y:      Math.random() * -canvas.height,
    speed,
    length: config.length[0] + Math.random() * (config.length[1] - config.length[0]),
    alpha:  0.25 + Math.random() * 0.55,
    width:  0.5 + Math.random() * 0.9,
    // cursor distortion state
    pushed: 0,
  };
}

function initDrops() {
  drops = [];
  for (let i = 0; i < config.dropCount; i++) {
    const d = makeDropRandom();
    d.y = Math.random() * canvas.height; // spread on load
    drops.push(d);
  }
}
initDrops();

// ── splash pool ───────────────────────────────────
const splashes = [];

function addSplash(x, y, force = 1) {
  if (!config.splash) return;
  const count = 2 + Math.floor(Math.random() * 3);
  for (let i = 0; i < count; i++) {
    const angle = (-Math.PI * 0.6) + Math.random() * (Math.PI * 0.2) - Math.PI * 0.1;
    const spd   = (1.5 + Math.random() * 3) * force;
    splashes.push({
      x, y,
      vx: Math.cos(angle) * spd * (Math.random() < 0.5 ? 1 : -1),
      vy: -Math.sin(Math.abs(angle)) * spd,
      alpha: 0.55 + Math.random() * 0.3,
      r: 0,
    });
  }
  // ellipse ripple
  splashes.push({ type:'ripple', x, y, r:0, maxR: 8 + Math.random()*10*force, alpha: 0.35 });
}

// ── cursor ripples (click) ────────────────────────
const cursorRipples = [];

window.addEventListener('click', e => {
  for (let i = 0; i < 6; i++) addSplash(e.clientX, e.clientY, 2.5);
  cursorRipples.push({ x: e.clientX, y: e.clientY, r: 0, alpha: 0.7 });
});

// ── thunder state ─────────────────────────────────
let flashAlpha   = 0;
let nextThunder  = 0;
let rumbleTimer  = 0;

function scheduleThunder() {
  nextThunder = performance.now() + 3000 + Math.random() * 8000;
}
scheduleThunder();

// ── fog layers ────────────────────────────────────
const fogLayers = [
  { x: 0,   y: canvas.height * 0.55, vy: -0.08, alpha: 0.07 },
  { x: 200, y: canvas.height * 0.65, vy: -0.05, alpha: 0.05 },
  { x: -80, y: canvas.height * 0.72, vy: -0.04, alpha: 0.04 },
];

// ── off-screen splash canvas ──────────────────────
// (nothing extra needed; just draw into main ctx)

// ── draw loop ─────────────────────────────────────
let lastTime = 0;
const WIND_SLANT = 0.18;

function draw(now) {
  const dt = Math.min((now - lastTime) / 16.67, 3); // normalise to 60fps
  lastTime = now;

  // background
  ctx.fillStyle = config.bgColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // subtle ground reflection gradient
  const gGrad = ctx.createLinearGradient(0, canvas.height * 0.8, 0, canvas.height);
  gGrad.addColorStop(0, 'rgba(40,80,130,0)');
  gGrad.addColorStop(1, 'rgba(40,80,130,0.06)');
  ctx.fillStyle = gGrad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // fog
  if (config.fog) {
    for (const fl of fogLayers) {
      const fg = ctx.createRadialGradient(
        canvas.width / 2, fl.y, 0,
        canvas.width / 2, fl.y, canvas.width * 0.7
      );
      fg.addColorStop(0, `rgba(100,150,200,${fl.alpha})`);
      fg.addColorStop(1, 'rgba(100,150,200,0)');
      ctx.fillStyle = fg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      fl.y += fl.vy * dt;
      if (fl.y < -100) fl.y = canvas.height + 100;
    }
  }

  // thunder flash
  if (config.thunder) {
    const nt = now;
    if (nt >= nextThunder) {
      flashAlpha = 0.55 + Math.random() * 0.35;
      scheduleThunder();
    }
    if (flashAlpha > 0) {
      ctx.fillStyle = `rgba(220,235,255,${flashAlpha})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      flashAlpha -= 0.06 * dt;
      if (flashAlpha < 0) flashAlpha = 0;
    }
  }

  // ── cursor distortion halo ──────────────────────
  const halo = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 120);
  halo.addColorStop(0, 'rgba(140,200,255,0.055)');
  halo.addColorStop(1, 'rgba(140,200,255,0)');
  ctx.fillStyle = halo;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // ── drops ──────────────────────────────────────
  const wind = config.wind;

  for (const d of drops) {
    // cursor deflection — drops near cursor get pushed sideways
    const dx = d.x - mouse.x;
    const dy = d.y - mouse.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const RADIUS = 90;
    let deflect = 0;
    if (dist < RADIUS && dist > 0) {
      const force = (1 - dist / RADIUS);
      deflect = (dx / dist) * force * 4;
      d.pushed = Math.max(d.pushed, force);
    } else {
      d.pushed *= 0.92;
    }

    const slant = wind + deflect * 0.08 + (mouse.vx * 0.002);
    const ex = d.x + slant * d.length;
    const ey = d.y + d.length;

    // motion blur style: faded at top, solid at bottom
    const grad = ctx.createLinearGradient(d.x, d.y, ex, ey);
    grad.addColorStop(0,   `rgba(180,215,255,0)`);
    grad.addColorStop(0.4, `rgba(180,215,255,${d.alpha * 0.4})`);
    grad.addColorStop(1,   `rgba(200,230,255,${d.alpha})`);

    ctx.beginPath();
    ctx.moveTo(d.x, d.y);
    ctx.lineTo(ex, ey);
    ctx.strokeStyle = grad;
    ctx.lineWidth   = d.width + d.pushed * 0.6;
    ctx.lineCap     = 'round';
    ctx.stroke();

    d.x += (d.speed * slant) * dt;
    d.y += d.speed * dt;

    // reset
    if (d.y - d.length > canvas.height || d.x > canvas.width + 100 || d.x < -100) {
      addSplash(d.x, canvas.height - 1);
      const nd = makeDropRandom();
      // reset y to top, x random
      nd.y = -nd.length - Math.random() * 40;
      Object.assign(d, nd);
    }
  }

  // ── splashes ────────────────────────────────────
  for (let i = splashes.length - 1; i >= 0; i--) {
    const s = splashes[i];
    if (s.type === 'ripple') {
      ctx.beginPath();
      ctx.ellipse(s.x, s.y, s.r * 2.5, s.r * 0.5, 0, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(180,215,255,${s.alpha})`;
      ctx.lineWidth   = 0.7;
      ctx.stroke();
      s.r     += 1.2 * dt;
      s.alpha -= 0.025 * dt;
      if (s.alpha <= 0 || s.r > s.maxR) { splashes.splice(i, 1); }
    } else {
      // droplet arc
      ctx.beginPath();
      ctx.arc(s.x, s.y, 1.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180,220,255,${s.alpha})`;
      ctx.fill();
      s.vx    *= 0.88;
      s.vy    += 0.4 * dt; // gravity
      s.x     += s.vx * dt;
      s.y     += s.vy * dt;
      s.alpha -= 0.035 * dt;
      if (s.alpha <= 0) splashes.splice(i, 1);
    }
  }

  // ── click ripples ────────────────────────────────
  for (let i = cursorRipples.length - 1; i >= 0; i--) {
    const cr = cursorRipples[i];
    ctx.beginPath();
    ctx.arc(cr.x, cr.y, cr.r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(160,210,255,${cr.alpha})`;
    ctx.lineWidth = 1.2;
    ctx.stroke();
    cr.r     += 3.5 * dt;
    cr.alpha -= 0.028 * dt;
    if (cr.alpha <= 0) cursorRipples.splice(i, 1);
  }

  requestAnimationFrame(draw);
}

requestAnimationFrame(t => { lastTime = t; requestAnimationFrame(draw); });

// ── button controls ───────────────────────────────
const btns = {
  'btn-heavy':   'heavy',
  'btn-medium':  'medium',
  'btn-drizzle': 'drizzle',
  'btn-thunder': 'thunder',
};

Object.entries(btns).forEach(([id, preset]) => {
  document.getElementById(id).addEventListener('click', () => {
    Object.assign(config, PRESETS[preset], { bgColor: '#060a10' });
    initDrops();
    // update active state
    document.querySelectorAll('.rain-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (preset === 'thunder') scheduleThunder();
  });
});

// ── cursor size reacts to speed ───────────────────
setInterval(() => {
  const speed = Math.sqrt(mouse.vx**2 + mouse.vy**2);
  const s = Math.min(speed / 5, 3);
  cursorDot.style.width  = (8 + s * 6) + 'px';
  cursorDot.style.height = (8 + s * 6) + 'px';
  cursorRing.style.width  = (36 + s * 12) + 'px';
  cursorRing.style.height = (36 + s * 12) + 'px';
  mouse.vx *= 0.7;
  mouse.vy *= 0.7;
}, 30);
</script>
</body>
</html>
